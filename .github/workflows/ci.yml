name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-website:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./website
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Lint with flake8
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Test with pytest
      env:
        SECRET_KEY: "test-secret-key"
        GET_INSTITUTIONS: "http://test/institutions"
        GET_INSTITUTION: "http://test/institution"
        GET_INSTITUTIONS_BY_STATE: "http://test/state"
        GET_INSTITUTIONS_BY_REGION: "http://test/region"
        CHATBOT_API_URL: "http://test/chatbot"
      run: pytest tests/

  test-serverless:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./serverless
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install moto
    - name: Lint with flake8
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Test with pytest
      run: PYTHONPATH=. pytest tests/

  test-chatbot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./chatbot/backend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Lint with flake8
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Test with pytest
      run: PYTHONPATH=. pytest tests/
