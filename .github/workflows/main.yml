name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-validate:
    name: Lint & Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linting Tools
        run: pip install flake8 black

      - name: Check Formatting (Black)
        run: black --check . || echo "Format warnings found, but continuing..."

      - name: Lint Code (Flake8)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  build-serverless-api:
    name: Build Serverless API
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Serverless Framework
        run: npm install -g serverless

      - name: Install Plugins
        working-directory: ./serverless
        run: npm install

      - name: Serverless Package (Build Validation)
        working-directory: ./serverless
        run: serverless package

  build-chatbot-lex:
    name: Build Chatbot Lex
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Serverless Framework
        run: npm install -g serverless

      - name: Install Plugins
        working-directory: ./chatbot/backend
        run: npm install

      - name: Serverless Package (Build Validation)
        working-directory: ./chatbot/backend
        run: serverless package
