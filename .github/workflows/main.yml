name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-validate:
    name: Lint & Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linting Tools
        run: pip install flake8 black

      - name: Check Formatting (Black)
        # Exclui diretorios gerados automaticamente para evitar falsos positivos
        run: black --check --exclude "(node_modules|\.serverless|\.venv|venv)" . || echo "Format warnings found, but continuing..."

      - name: Lint Code (Flake8)
        # Exclui node_modules e artefatos do Serverless
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=node_modules,.serverless,venv,.venv

  build-serverless-api:
    name: Build Serverless API
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Serverless Framework
        run: npm install -g serverless@3

      - name: Install Plugins
        working-directory: ./serverless
        run: npm install

      - name: Serverless Package (Build Validation)
        working-directory: ./serverless
        # SLS_SKIP_VALIDATE suprime erros de resolucao de variaveis (SSM, env) em CI
        env:
          SLS_SKIP_VALIDATE: 1
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_DEFAULT_REGION: us-east-1
        run: serverless package

  build-chatbot-lex:
    name: Build Chatbot Lex
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Serverless Framework
        run: npm install -g serverless@3

      - name: Install Plugins
        working-directory: ./chatbot/backend
        run: npm install

      - name: Serverless Package (Build Validation)
        working-directory: ./chatbot/backend
        # SLS_SKIP_VALIDATE suprime erros de resolucao de variaveis em CI
        env:
          SLS_SKIP_VALIDATE: 1
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_DEFAULT_REGION: us-east-1
        run: serverless package
