{% extends 'base.html' %}
{% load static %}

{% block content %}
<!-- Chatbot Content -->
<main class="flex-grow-1 d-flex justify-content-center align-items-center py-5" aria-label="Interface do Assistente Virtual">
    <div class="col-12 col-md-8 col-lg-6">
        <section class="institution-card d-flex flex-column h-100" id="chat-container" aria-label="Janela de Conversa">
            
            <!-- Chat Header -->
            <div class="d-flex align-items-center mb-4 border-bottom pb-3" style="border-color: rgba(0,0,0,0.05) !important;">
                <div class="bg-primary rounded-circle d-flex justify-content-center align-items-center me-3" style="width: 48px; height: 48px;">
                    <span class="text-white fw-bold fs-4">S</span>
                </div>
                <div>
                    <h2 class="mb-0 fs-4 text-primary">SoliBot</h2>
                    <span class="badge bg-success rounded-pill" style="font-size: 0.75rem;">Online</span>
                </div>
            </div>

            <!-- Chat Messages Box -->
            <div class="mb-4 rounded p-3 bg-white overflow-auto shadow-inner flex-grow-1" id="chat-box" style="height: 400px; border: 1px solid rgba(0,0,0,0.05);" role="log" aria-live="polite" aria-label="Histórico de Mensagens">
                <!-- The messages will appear here -->
                <div class="text-center text-muted small my-2">Hoje</div>
                <div class="d-flex mb-3">
                    <div class="bg-light rounded p-3" style="max-width: 80%; border-bottom-left-radius: 0 !important;">
                        Olá! Eu sou o SoliBot. Como posso ajudar você hoje?
                    </div>
                </div>
            </div>

            <!-- Chat Inputs -->
            <form id="chat-form" class="d-flex flex-column gap-3 mb-3">
                {% csrf_token %}
                <div class="input-group shadow-sm rounded">
                    <input type="text" id="message" class="form-control border-0 p-3 bg-light" placeholder="Digite sua mensagem..." aria-label="Campo de texto da mensagem">
                    <button type="submit" class="btn btn-primary px-4" aria-label="Enviar Mensagem">Enviar</button>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <label for="image" class="form-label mb-0 small text-muted fw-bold">Anexar imagem (Opcional):</label>
                    <input type="file" id="image" class="form-control form-control-sm border-0 bg-light" accept="image/*" aria-label="Enviar uma imagem">
                </div>
                <input type="hidden" id="session_id">
            </form>

            <div class="d-flex justify-content-end">
                <button id="clear-chat" class="btn btn-outline-secondary btn-sm" aria-label="Limpar histórico de conversa">Limpar Conversa</button>
            </div>
        </section>
    </div>
</main>
{% endblock content %}
