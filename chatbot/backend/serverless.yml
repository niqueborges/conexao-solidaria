service: chatbot-lex

provider:
  name: aws
  runtime: python3.11
  memorySize: 128
  timeout: 10
  tracing:
    apiGateway: true
    lambda: true
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - xray:PutTraceSegments
            - xray:PutTelemetryRecords
          Resource: "*"
        - Effect: Allow
          Action:
            - lex:RecognizeText
            - lex:RecognizeUtterance
            - lex:DeleteSession
          Resource: "*"
        - Effect: Allow
          Action:
            - s3:PutObject
            - polly:SynthesizeSpeech
          Resource: "*"
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource: arn:aws:secretsmanager:${opt:region, 'us-east-1'}:${env:AWS_ACCOUNT_ID, '*'}:secret:conexao-solidaria/twilio*

  environment:
    TWILIO_AUTH_TOKEN: ${env:TWILIO_AUTH_TOKEN, ''}
  apiGateway:
    apiKeys:
      - chatbotWebClientKey

functions:
  hello:
    handler: handlers/health.hello
    events:
      - http:
          path: /
          method: get

  lex:
    handler: handlers/lex.lex
    timeout: 30
    events:
      - http:
          path: /
          method: post

  twilio:
    handler: handlers/twilio.twilio
    timeout: 15
    events:
      - http:
          path: /twilio
          method: post

  upload_url:
    handler: handlers/upload.get_upload_url
    events:
      - http:
          path: /upload-url
          method: post
          private: true

  web_proxy:
    handler: handlers/proxy.web_proxy
    timeout: 29
    events:
      - http:
          path: /web-proxy
          method: post
          private: true

package:
  patterns:
    - '!venv/**'
    - '!.venv/**'
    - '!tests/**'
    - '!.pytest_cache/**'
    - '!node_modules/**'


plugins:
  - serverless-offline
  - serverless-python-requirements
  - serverless-dotenv-plugin

custom:
  pythonRequirements:
    dockerizePip: non-linux
    fileName: requirements.txt
