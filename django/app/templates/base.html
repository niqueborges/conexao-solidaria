<!DOCTYPE html>
{% load static %}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Conexão Solidária - Facilitando conexões entre doadores e instituições.">
    <meta name="keywords" content="solidariedade, doação, instituições, conexão">
    <meta name="author" content="Conexão Solidária">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Conexão Solidária</title>

    {% block styles %}
        <link rel="stylesheet" type="text/css" href="{% static 'css/base.css' %}">
    {% endblock %}
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">
    <!-- Header -->
    <header class="bg-black py-3 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h3 mb-0 text-primary">Conexão Solidária</h1>
            <nav>
                <ul class="nav">
                    <li class="nav-item"><a href="/" class="nav-link text-light">Home</a></li>
                    <li class="nav-item"><a href="/terms-of-use" class="nav-link text-light">Termos de Uso</a></li>
                    <li class="nav-item"><a href="/institutions" class="nav-link text-light">Instituições</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow-1 py-5">
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-black py-4 text-center mt-auto">
        <div class="container">
            <p class="mb-1">&copy; 2024 Conexão Solidária. Todos os direitos reservados.</p>
            <p><a href="#" class="text-primary">Contato</a> | <a href="/terms-of-use" class="text-primary">Termos de Uso</a></p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
