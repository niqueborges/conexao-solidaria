app: description
service: conexao-solidaria

provider:
  name: aws
  runtime: python3.9
  memorySize: 128
  timeout: 10
  tracing:
    apiGateway: true
    lambda: true
  environment:
    TABLE_NAME: ${self:custom.tableName}
    REGION_NAME: ${opt:region, 'us-east-1'}
    BILLING_MODE: PAY_PER_REQUEST
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - xray:PutTraceSegments
            - xray:PutTelemetryRecords
          Resource: "*"
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource: !GetAtt InstitutionsTable.Arn
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
            - rekognition:DetectModerationLabels
          Resource: "*"

functions:
  # Health handler
  health:
    handler: api/v1/handlers.health.health
    events:
      - httpApi:
          path: /
          method: get

  # Institutions CRUD handlers
  create:
    handler: api/v1/handlers.institution.create
    events:
      - httpApi:
          method: post
          path: /api/v1/institutions

  list:
    handler: api/v1/handlers.institution.list_items
    events:
      - httpApi:
          method: get
          path: /api/v1/institutions

  retrieve:
    handler: api/v1/handlers.institution.retrieve
    events:
      - httpApi:
          method: get
          path: /api/v1/institutions/{cnpj}

  update:
    handler: api/v1/handlers.institution.update
    events:
      - httpApi:
          method: put
          path: /api/v1/institutions/{cnpj}

  delete:
    handler: api/v1/handlers.institution.delete
    events:
      - httpApi:
          method: delete
          path: /api/v1/institutions/{cnpj}

  # Bedrock suggestions handler
  suggestions:
    handler: api/v1/handlers.bedrock.suggestions
    timeout: 30
    events:
      - httpApi:
          method: post
          path: /api/v1/institutions/suggestions

  # Rekognition scan handler
  scan:
    handler: api/v1/handlers.rekognition.scan
    events:
      - httpApi:
          method: post
          path: /api/v1/scan

  # Query Institutions handler
  query:
    handler: api/v1/handlers.institution.query
    events:
      - httpApi:
          method: get
          path: /api/v1/institutions/query

plugins:
  - serverless-offline
  - serverless-python-requirements
  - serverless-dotenv-plugin

custom:
  tableName: institutions-${opt:stage, 'dev'}
  pythonRequirements:
      useStaticCache: false
      useDownloadCache: false
      pipCmdExtraArgs:
        - "--platform manylinux2014_x86_64"
        - "--implementation cp"
        - "--python-version 3.9"
        - "--only-binary=:all:"
        - "--upgrade"

resources:
  Resources:
    InstitutionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.tableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: cnpj
            AttributeType: S
        KeySchema:
          - AttributeName: cnpj
            KeyType: HASH
