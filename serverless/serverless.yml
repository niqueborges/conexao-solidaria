app: description
service: conexao-solidaria

provider:
  name: aws
  runtime: python3.9

package:
  individually: true

functions:
  health:
    handler: api/v1/handlers.health.health
    events:
      - httpApi:
          path: /
          method: get

  # CRUD handlers
  create:
    handler: api/v1/handlers.institution.create
    events:
      - httpApi:
          method: post
          path: /api/v1/institutions

  list:
    handler: api/v1/handlers.institution.list_items
    events:
      - httpApi:
          method: get
          path: /api/v1/institutions

  retrieve:
    handler: api/v1/handlers.institution.retrieve
    events:
      - httpApi:
          method: get
          path: /api/v1/institutions/{cnpj}

  update:
    handler: api/v1/handlers.institution.update
    events:
      - httpApi:
          method: put
          path: /api/v1/institutions/{cnpj}

  delete:
    handler: api/v1/handlers.institution.delete
    events:
      - httpApi:
          method: delete
          path: /api/v1/institutions/{cnpj}

  tips:
    handler: api/v1/handlers.tips.lambda_tips
    timeout: 60
    events:
      - httpApi:
          path: api/v1/institutions/tips
          method: post


plugins:
  - serverless-offline
  - serverless-python-requirements
  - serverless-dotenv-plugin

custom:
  pythonRequirements:
    fileName: ../requirements.txt
